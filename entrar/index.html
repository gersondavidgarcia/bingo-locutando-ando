<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="refresh" content="0; url=https://chat.whatsapp.com/JUmVfoT2vqZKMKNJFgFLAa">
    
    <title>Bingo Locutando - Conectando...</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: #d4af37; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
        }

        /* ESTILO DEL MENSAJE DE SALTO */
        .redirect-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .mensaje-salto {
            font-size: 55px; /* Letras bien grandes como pediste */
            font-weight: 900;
            background: linear-gradient(to bottom, #f9f295 0%, #e0aa3e 40%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1;
            filter: drop-shadow(0 0 15px rgba(224, 170, 62, 0.4));
        }

        .sub-mensaje {
            font-size: 20px;
            color: #f1e5ac;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* Estrellas decorativas */
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: move-and-twinkle var(--duration) infinite linear;
        }
        @keyframes move-and-twinkle {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(var(--move-x), var(--move-y)) scale(1.3); opacity: 0.6; }
            100% { transform: translate(calc(var(--move-x) * 2), calc(var(--move-y) * 2)) scale(1); opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="redirect-container">
        <div class="mensaje-salto">ENTRANDO AL GRUPO...</div>
        <div class="sub-mensaje">PREPÁRATE PARA EL BINGO</div>
    </div>

    <script>
        // Redirección inmediata
        window.location.href = "https://chat.whatsapp.com/JUmVfoT2vqZKMKNJFgFLAa";

        // Generador de estrellas para mantener tu estética
        const starsContainer = document.getElementById('stars');
        const starCount = 60;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 3 + 1;
            const duration = Math.random() * 15 + 10;
            const moveX = (Math.random() - 0.5) * 120 + "px";
            const moveY = (Math.random() - 0.5) * 120 + "px";
            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.setProperty('--move-x', moveX);
            star.style.setProperty('--move-y', moveY);
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
