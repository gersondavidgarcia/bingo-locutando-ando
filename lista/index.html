<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Lineal Gerson</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 10px; }
        .card { background: #111; padding: 15px; border-radius: 12px; max-width: 450px; margin: auto; border: 2px solid #ffcc00; }
        h2 { color: #00ff88; text-align: center; margin-top: 0; }
        .input-group { display: flex; align-items: center; background: #222; margin-bottom: 5px; border-radius: 8px; padding: 5px; border: 1px solid #333; }
        .num { width: 30px; font-weight: bold; color: #ffcc00; text-align: center; }
        input { background: transparent; border: none; color: white; width: 100%; padding: 8px; font-size: 16px; outline: none; }
        .btn-pago { background: #444; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; filter: grayscale(1); font-size: 1.2rem; }
        .btn-pago.pagado { filter: grayscale(0); background: #28a745; }
        .btn-copiar { width: 100%; background: #25D366; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎰 CONTROL LINEAL</h2>
    <div id="lista-inputs">Conectando...</div>
    <button class="btn-copiar" onclick="copiarWhatsApp()">📋 COPIAR WHATSAPP</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB12qk_Iw_xAFWnSw8RU_211o9HnyTczAQ",
        authDomain: "bingo-locutando-ando.firebaseapp.com",
        projectId: "bingo-locutando-ando",
        storageBucket: "bingo-locutando-ando.firebasestorage.app",
        messagingSenderId: "547896039173",
        appId: "1:547896039173:web:e7f5389dde11af9078096c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "bingo", "lineal"); // Ruta exacta de image_62a8b4.png

    let cartonesLocal = [];

    onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
            cartonesLocal = snap.data().cartones || [];
            render();
        } else {
            document.getElementById('lista-inputs').innerText = "No se encontró el documento 'bingo/lineal'";
        }
    });

    function render() {
        const cont = document.getElementById('lista-inputs');
        cont.innerHTML = "";
        cartonesLocal.forEach((carton, index) => {
            const info = carton.lineas[0];
            const pagado = info.estado === "pagado";
            cont.innerHTML += `
                <div class="input-group">
                    <span class="num">${carton.id}</span>
                    <input type="text" value="${info.nombre || ''}" 
                           onchange="actualizarFB(${index}, this.value)" 
                           placeholder="Vacio">
                    <button class="btn-pago ${pagado ? 'pagado' : ''}" 
                            onclick="window.togglePago(${index})">💵</button>
                </div>`;
        });
    }

    window.actualizarFB = async (index, valor) => {
        const nombreLimpio = valor.trim().toUpperCase();
        let nuevoEstado = cartonesLocal[index].lineas[0].estado;
        
        if (nombreLimpio !== "" && nuevoEstado === "libre") nuevoEstado = "reservado";
        if (nombreLimpio === "") nuevoEstado = "libre";

        cartonesLocal[index].lineas[0].nombre = nombreLimpio;
        cartonesLocal[index].lineas[0].estado = nuevoEstado;
        
        await updateDoc(docRef, { cartones: cartonesLocal });
    };

    window.togglePago = async (index) => {
        const estadoActual = cartonesLocal[index].lineas[0].estado;
        cartonesLocal[index].lineas[0].estado = (estadoActual === "pagado") ? "reservado" : "pagado";
        
        await updateDoc(docRef, { cartones: cartonesLocal });
    };

    window.copiarWhatsApp = () => {
        let txt = "*Listado Bingo*\n\n";
        txt += "*Precio: $1.000 💵*\n*Premio: $10.000 pesos*\n\n";
        
        cartonesLocal.forEach(c => {
            const i = c.lineas[0];
            const pago = i.estado === "pagado" ? " 💵" : "";
            txt += `${c.id} 🍀${i.nombre || ""}${pago}\n`;
        });

        txt += "\n✅ *Nequi: 3169461962*";
        navigator.clipboard.writeText(txt);
        alert("¡Copiado para WhatsApp!");
    };
</script>
</body>
</html>
