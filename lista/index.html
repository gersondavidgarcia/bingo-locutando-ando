<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Lineal - Control Pro</title>
    <link rel="icon" type="image/png" href="logo-locutando.png">
    <style>
        :root { --oro: #ffcc00; --fondo: #000; --verde: #00ff88; }
        body { font-family: 'Arial Black', sans-serif; background: var(--fondo); color: #fff; margin: 0; padding: 0; }
        
        .header { background: #111; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--oro); }
        .input-wrapper { position: relative; width: 90%; max-width: 500px; margin: auto; }
        input#nombreUser { 
            padding: 15px; border-radius: 8px; border: 2px solid #444; width: 100%;
            font-size: 20px; font-weight: bold; text-transform: uppercase; text-align: center; background: #222; color: var(--verde);
            box-sizing: border-box; padding-right: 45px;
        }
        .btn-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #444; color: #fff; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; font-size: 18px; line-height: 1; }

        .tablero { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; max-width: 600px; margin: auto; }
        .carton { background: #fff; border-radius: 8px; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; height: 90px; transition: 0.2s; }
        .carton-h { background: #222; color: var(--oro); padding: 4px; font-weight: bold; text-align: center; font-size: 18px; }
        .linea { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #000; cursor: pointer; text-align: center; padding: 2px; box-sizing: border-box; text-transform: uppercase; }
        
        .libre { color: #ccc !important; font-size: 24px !important; opacity: 0.4; }
        .reservado { background-color: #ffeb3b !important; }
        .pagado { background-color: #28a745 !important; color: #fff !important; }
        .sel { outline: 5px solid #007bff; z-index: 5; transform: scale(1.02); }

        .panel-inferior { background: #111; padding: 20px; border-top: 4px solid var(--oro); margin-top: 20px; }
        .controles-admin { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-verde { background: var(--verde); color: #000; }
        .btn-rojo { background: #dc3545; color: #fff; }
        .btn-azul { background: #007bff; color: #fff; }
        
        .btn-copiar-grande { background: #25D366; color: #000; width: 100%; font-size: 22px; padding: 20px; margin-top: 10px; border: 3px solid #fff; border-radius: 12px; }
        .btn-copiar-caja { background: #ffcc00; color: #000; width: 100%; font-size: 16px; padding: 15px; margin-top: 10px; border: 2px solid #000; border-radius: 8px; }

        textarea { width: 100%; background: #000; color: #fff; border: 2px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 16px; box-sizing: border-box; text-transform: uppercase; }

        .stats { text-align: center; color: #fff; background: #222; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; font-weight: bold; border: 1px solid #444; }

        /* SECCIÓN DEL CONTROL DE PREMIOS EN DIRECTO */
        .seccion-ganador { background: #222; border: 2px solid var(--oro); padding: 20px; border-radius: 8px; margin-top: 15px; margin-bottom: 15px; }
        .ganador-inputs { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; margin-bottom: 15px; }
        .bloque-input { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 280px; }
        .bloque-input label { font-size: 18px; font-weight: bold; color: #fff; }
        .bloque-input input { width: 90px; padding: 12px; font-size: 24px; font-weight: bold; text-align: center; border-radius: 8px; border: 2px solid var(--oro); background: #000; color: #fff; }
        
        .ganador-extras { display: flex; justify-content: center; gap: 25px; font-size: 16px; margin-bottom: 15px; padding: 5px; }
        .ganador-extras label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold; }
        .ganador-extras input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        
        .grupo-botones-ganador { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn-ganador-enviar { background: #007bff; color: white; width: 100%; padding: 16px; font-size: 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border: 2px solid #fff; }
        .btn-ganador-caja { background: #e0a800; color: black; width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border: 2px solid #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="input-wrapper">
            <input type="text" id="nombreUser" list="sugerenciasCaja" placeholder="ESCRIBE NOMBRE AQUÍ" oninput="filtrarSugerencias(this.value)">
            <datalist id="sugerenciasCaja"></datalist>
            <button class="btn-clear" onclick="limpiarNombre()">✕</button>
        </div>
    </div>

    <div class="tablero" id="tablero"></div>

    <div class="panel-inferior">
        <div class="stats" id="stats">CARGANDO...</div>
        
        <div class="controles-admin">
            <button class="btn btn-verde" onclick="accionAdmin('pagado')">💰 MARCAR PAGO</button>
            <button class="btn btn-rojo" onclick="accionAdmin('libre')">❌ LIBERAR</button>
            <button class="btn btn-azul" onclick="toggleLupa()" id="btnLupa">🔍 BUSCAR</button>
        </div>

        <div class="seccion-ganador">
            <div style="color: var(--oro); font-weight: bold; text-align: center; margin-bottom: 15px; font-size: 16px; letter-spacing: 1px;">🏆 CONTROL DE GANADORES</div>
            
            <div class="ganador-inputs">
                <div class="bloque-input">
                    <label>BINGO #:</label>
                    <input type="number" id="numGanador" min="1" max="15" placeholder="#">
                </div>
                
                <div class="bloque-input">
                    <label style="color: var(--oro);">RULETA #:</label>
                    <input type="number" id="numRuletaFisica" min="1" max="15" placeholder="#">
                </div>
            </div>

            <div class="ganador-extras">
                <label id="lblFlash"><input type="checkbox" id="chkFlash"> ⚡ FLASH</label>
            </div>
            
            <div class="grupo-botones-ganador">
                <button class="btn-ganador-enviar" onclick="generarMensajeGanador()">📋 COPIAR MENSAJE GANADOR</button>
                <button class="btn-ganador-caja" onclick="cargarPremiosACaja()">💰 REGISTRAR PREMIOS EN CAJA</button>
            </div>
        </div>

        <div class="caja-gastos">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="color: var(--verde); font-weight: bold;">📓 SALDOS DE CAJA</label>
                <button class="btn btn-verde" style="padding: 5px 10px;" onclick="guardarCaja()">💾 GUARDAR CAJA</button>
            </div>
            <textarea id="notas-caja" rows="5" placeholder="DAVID: 10" oninput="this.value = this.value.toUpperCase()"></textarea>
        </div>

        <button id="btnCopiarPrincipal" class="btn btn-copiar-grande" onclick="copiarListaBingo()">📋 COPIAR LISTA WHATSAPP</button>
        <button class="btn btn-copiar-caja" onclick="copiarSoloCaja()">📓 COPIAR SOLO SALDOS</button>
        
        <button class="btn btn-rojo" style="width:100%; margin-top:25px;" onclick="reiniciarTablero()">♻️ REINICIAR SOLO TABLERO</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB12qk_Iw_xAFWnSw8RU_211o9HnyTczAQ",
        authDomain: "bingo-locutando-ando.firebaseapp.com",
        projectId: "bingo-locutando-ando",
        storageBucket: "bingo-locutando-ando.firebasestorage.app",
        messagingSenderId: "547896039173",
        appId: "1:547896039173:web:e7f5389dde11af9078096c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "bingo", "lineal");

    let datos = [];
    let seleccionados = [];
    let modoLupa = false;
    let infoBusqueda = "";
    let numeroRonda = 1;

    onSnapshot(docRef, async (snap) => {
        if (snap.exists()) {
            const d = snap.data();
            
            if (!d.cartones || d.cartones.length === 0) {
                let estructuraBase = [];
                for (let i = 1; i <= 15; i++) {
                    estructuraBase.push({
                        id: String(i), 
                        lineas: [{ estado: "libre", nombre: "" }]
                    });
                }
                datos = estructuraBase;
                await updateDoc(docRef, { cartones: datos });
            } else {
                datos = d.cartones.slice(0, 15);
            }

            document.getElementById('notas-caja').value = (d.notas_caja || "").toUpperCase();
            numeroRonda = d.numero_ronda || 1; 
            
            dibujar();
            actualizarStats();
        }
    });

    function dibujar() {
        const container = document.getElementById("tablero");
        container.innerHTML = "";
        datos.forEach((carton, idx) => {
            const info = carton.lineas[0];
            const isSelected = seleccionados.includes(idx);
            const tieneNombre = info.nombre && info.nombre !== "";
            const div = document.createElement("div");
            div.className = `carton ${isSelected ? 'sel' : ''}`;
            div.onclick = () => clickCasilla(idx);
            
            div.innerHTML = `<div class="carton-h">${carton.id}</div><div class="linea ${info.estado} ${!tieneNombre ? 'libre' : ''}">${tieneNombre ? info.nombre : carton.id}</div>`;
            container.appendChild(div);
        });
    }

    window.clickCasilla = async (idx) => {
        const info = datos[idx].lineas[0];
        const nombreInput = document.getElementById("nombreUser").value.trim().toUpperCase();
        
        if (modoLupa && info.nombre) {
            const buscar = info.nombre;
            seleccionados = [];
            datos.forEach((c, i) => { if(c.lineas[0].nombre === buscar) seleccionados.push(i); });
            infoBusqueda = `${buscar}: ${seleccionados.length} líneas`;
            dibujar();
            actualizarStats();
        } else {
            if (info.estado !== 'libre' && nombreInput !== "") { toggleSel(idx); return; }
            if (info.estado === 'libre' && nombreInput !== "") {
                datos[idx].lineas[0] = { nombre: nombreInput, estado: "reservado" };
                await updateDoc(docRef, { cartones: datos });
            } else { 
                toggleSel(idx); 
            }
        }
    };

    function toggleSel(idx) {
        const sIdx = seleccionados.indexOf(idx);
        if (sIdx > -1) seleccionados.splice(sIdx, 1);
        else seleccionados.push(idx);
        dibujar();
    }

    window.toggleLupa = () => {
        modoLupa = !modoLupa; seleccionados = []; infoBusqueda = "";
        document.getElementById("btnLupa").innerText = modoLupa ? "✅ BUSCANDO" : "🔍 BUSCAR";
        dibujar(); actualizarStats();
    };

    // ACCIONES ADMINISTRATIVAS CON PROTECCIÓN EN EL BOTÓN LIBERAR
    window.accionAdmin = async (nuevoEstado) => {
        if (seleccionados.length === 0) return;
        let nuevaCaja = document.getElementById("notas-caja").value.toUpperCase();
        let cartonesAActualizar = [...datos];
        let cambiosRealizados = false;

        if (nuevoEstado === 'pagado') {
            let cartonesPorNombre = {};
            seleccionados.forEach(idx => {
                const info = datos[idx].lineas[0];
                if (info.nombre && info.estado !== 'pagado') {
                    if (!cartonesPorNombre[info.nombre]) cartonesPorNombre[info.nombre] = [];
                    cartonesPorNombre[info.nombre].push(idx);
                }
            });

            for (let nombre in cartonesPorNombre) {
                let indicesSeleccionados = cartonesPorNombre[nombre];
                let lineasAComprar = indicesSeleccionados.length;
                
                let lineasCaja = nuevaCaja.split('\n').map(l => l.trim()).filter(l => l !== "");
                let saldoActual = 0;
                let indexLinea = -1;

                lineasCaja.forEach((l, i) => {
                    if (l.startsWith(nombre + ":")) {
                        let partes = l.split(':');
                        saldoActual = parseInt(partes[1].trim()) || 0;
                        indexLinea = i;
                    }
                });

                if (indexLinea !== -1 && saldoActual >= lineasAComprar) {
                    let nuevoSaldo = saldoActual - lineasAComprar;
                    if (nuevoSaldo > 0) {
                        lineasCaja[indexLinea] = `${nombre}: ${nuevoSaldo}`;
                    } else {
                        lineasCaja.splice(indexLinea, 1); 
                    }
                    nuevaCaja = lineasCaja.join('\n');

                    indicesSeleccionados.forEach(idx => {
                        cartonesAActualizar[idx].lineas[0].estado = 'pagado';
                    });
                    cambiosRealizados = true;

                } else if (indexLinea !== -1 && saldoActual > 0) {
                    let cartonesParaCobrar = indicesSeleccionados.slice(0, saldoActual);
                    let cartonesRestantes = indicesSeleccionados.slice(saldoActual);
                    let lineasFaltantes = cartonesRestantes.length;

                    let mensajeAviso = `⚠️ El jugador "${nombre}" sólo tiene saldo para ${saldoActual} línea(s) en caja, pero seleccionaste ${lineasAComprar}.\n\n¿Deseas cobrar las ${saldoActual} línea(s) de la caja y pasar las ${lineasFaltantes} faltantes a VERDE directamente de todos modos?`;

                    let confirmarVerde = confirm(mensajeAviso);
                    if (confirmarVerde) {
                        lineasCaja.splice(indexLinea, 1);
                        nuevaCaja = lineasCaja.join('\n');

                        indicesSeleccionados.forEach(idx => {
                            cartonesAActualizar[idx].lineas[0].estado = 'pagado';
                        });
                        cambiosRealizados = true;
                    } else {
                        lineasCaja.splice(indexLinea, 1);
                        nuevaCaja = lineasCaja.join('\n');

                        cartonesParaCobrar.forEach(idx => {
                            cartonesAActualizar[idx].lineas[0].estado = 'pagado';
                        });
                        cambiosRealizados = true;
                    }
                } else {
                    let mensajeAviso = `⚠️ El jugador "${nombre}" NO tiene saldo disponible en la caja.\n\n¿Deseas registrar sus cartones y pasarlos a VERDE (PAGADO) directamente de todos modos?`;

                    let confirmarVerde = confirm(mensajeAviso);
                    if (confirmarVerde) {
                        indicesSeleccionados.forEach(idx => {
                            cartonesAActualizar[idx].lineas[0].estado = 'pagado';
                        });
                        cambiosRealizados = true;
                    }
                }
            }
        } else if (nuevoEstado === 'libre') {
            // ADVERTENCIA AÑADIDA PARA EVITAR EQUIVOCACIONES EN VIVO
            let confirmarLiberar = confirm("⚠️ ¿Seguro que deseas LIBERAR y borrar el nombre de los cartones seleccionados?");
            if (!confirmarLiberar) return;

            seleccionados.forEach(idx => {
                cartonesAActualizar[idx].lineas[0].estado = nuevoEstado;
                cartonesAActualizar[idx].lineas[0].nombre = "";
            });
            cambiosRealizados = true;
        }

        if (cambiosRealizados) {
            datos = cartonesAActualizar;
            seleccionados = [];
            await updateDoc(docRef, { cartones: datos, notas_caja: nuevaCaja });
        }
    };

    window.copiarListaBingo = () => {
        const emojisRonda = ["0️⃣", "1️⃣", "2️⃣", "3️⃣", "4️⃣", "5️⃣"];
        let txt = "";

        if (numeroRonda === 5) {
            txt = "⭐⭐⭐⭐⭐\n*RONDA ESPECIAL*\n🔥🔥🔥🔥🔥\n\n";
            txt += "*💵 Valor:* $1.000\n───────\n"; 
            txt += "🏆 *BINGO:* $10.000💰\n";
            txt += "🎯 *Aproximado VIP:* $10.000\n";
            txt += "🎰 *Ruleta PREM:* $5.000\n";
            txt += "🤑 *Bingo Total:* $25.000\n\n";
            txt += "⚠️ *REGLA:* En esta partida no se juega Bingo Flash\n\n";
        } else {
            txt = "*🎰 LISTADO BINGO LINEAL*\n";
            txt += `*Ronda ${emojisRonda[numeroRonda]}*\n\n`;
            txt += "*💵 Valor:* $1.000\n───────\n"; 
            txt += "🏆 *BINGO:* $10.000💰\n";
            txt += "🎰 *Ruleta:* $10.000 Extra\n";
            txt += "🎯 *Aproximado:* $5.000\n";
            txt += "⚡ *Flash 25:* $3.000 Extra\n\n";
            txt += "⚠️ *REGLA:* Si en la partida cae Flash y Ruleta, solo se paga el premio extra de la Ruleta.\n\n";
        }

        datos.forEach(c => {
            const i = c.lineas[0];
            txt += `${c.id} 🍀 ${i.nombre ? i.nombre : ""}${i.estado === "pagado" ? " ✅" : ""}\n`;
        });
        
        txt += "\n✅ *Nequi: 3169461962*";
        txt += (numeroRonda < 5) ? "\n✅ *Cada 5 Rondas se juega una ronda ESPECIAL*\n✅ *Juega con responsabilidad y disfruta la dinámica.*" : "\n✅ *Juega con responsabilidad y disfruta la dinámica.*";
        
        navigator.clipboard.writeText(txt);
        alert(numeroRonda === 5 ? "¡Lista ESPECIAL copiada! 🔥" : `Ronda ${numeroRonda} copiada`);
    };

    window.filtrarSugerencias = (valor) => {
        const input = valor.toUpperCase();
        document.getElementById("nombreUser").value = input;
        const datalist = document.getElementById("sugerenciasCaja");
        datalist.innerHTML = "";
        if (input.length === 0) return;
        document.getElementById("notas-caja").value.split('\n').forEach(linea => {
            const nombre = linea.split(':')[0].trim();
            if (nombre && nombre.startsWith(input)) {
                const opt = document.createElement("option");
                opt.value = nombre;
                datalist.appendChild(opt);
            }
        });
    };

    window.limpiarNombre = () => { document.getElementById("nombreUser").value = ""; document.getElementById("nombreUser").focus(); };
    window.guardarCaja = async () => { await updateDoc(docRef, { notas_caja: document.getElementById("notas-caja").value.toUpperCase() }); alert("Caja guardada ✅"); };

    window.copiarSoloCaja = () => {
        const cajaRaw = document.getElementById("notas-caja").value.trim();
        if(!cajaRaw) return;
        let txt = "📦*CAJA :*\n\n";
        cajaRaw.split('\n').forEach(l => {
            if(l.includes(':')) {
                let partes = l.split(':');
                txt += `${partes[0].trim().toUpperCase()}: ${partes[1].trim()}.000\n`;
            } else if (l.trim() !== "") { 
                txt += l.toUpperCase() + "\n"; 
            }
        });
        navigator.clipboard.writeText(txt.trim());
        alert("Saldos copiados");
    };

    // GENERADOR DE MENSAJES DE WHATSAPP REFORMADO (SIN MIX DE TOTAL CON APROXIMADOS)
    window.generarMensajeGanador = () => {
        const bInput = document.getElementById("numGanador").value;
        const rInput = document.getElementById("numRuletaFisica").value;

        if (!bInput || !rInput) { alert("Ingresa números de Bingo y Ruleta"); return; }

        const numBingo = parseInt(bInput);
        const numRuleta = parseInt(rInput);
        const idxBingo = numBingo - 1;
        const cartonBingo = datos[idxBingo];

        if (!cartonBingo || !cartonBingo.lineas[0].nombre) { alert("Cartón libre o sin nombre"); return; }
        const nombreBingo = cartonBingo.lineas[0].nombre.toUpperCase();

        let vecinoAnterior = numBingo === 1 ? 15 : numBingo - 1;
        let vecinoPosterior = numBingo === 15 ? 1 : numBingo + 1;
        let esAproximado = (numRuleta === vecinoAnterior || numRuleta === vecinoPosterior);

        const idxRuleta = numRuleta - 1;
        const cartonRuleta = datos[idxRuleta];
        const nombreRuleta = (cartonRuleta && cartonRuleta.lineas[0].nombre) ? cartonRuleta.lineas[0].nombre.toUpperCase() : "SIN ASIGNAR";

        let mensaje = `🏆 *GANADOR BINGO LINEAL* 🏆\n \n`;

        if (numeroRonda === 5) {
            if (numBingo === numRuleta) {
                mensaje += `🎰 *Ganador bingo # ${numBingo}*\n🎰 *Ruleta # ${numRuleta}*\n👤 *${nombreBingo}*\n \n🤑 *BINGO TOTAL:* *${nombreBingo}* gana 25mil`;
            } else if (esAproximado) {
                mensaje += `🎰 *Ganador bingo # ${numBingo}*\n👤 *${nombreBingo}* gana 10mil\n \n🎯 *Aproximado VIP # ${numRuleta}*\n👤 *${nombreRuleta}* gana 10mil extra`;
            } else {
                mensaje += `🎰 *Ganador bingo # ${numBingo}*\n👤 *${nombreBingo}* gana 10mil\n \n🎰 *Ruleta PREM # ${numRuleta}*\n👤 *${nombreRuleta}* gana 5mil extra`;
            }
        } else {
            let totalAcumulado = 10;
            let esRuletaMismoNumero = (numBingo === numRuleta);
            let aplicarFlash = document.getElementById("chkFlash").checked && !esRuletaMismoNumero;

            mensaje += `🎰 *Ganador bingo # ${numBingo}*\n👤 *${nombreBingo}* gana 10mil\n`;

            if (aplicarFlash) {
                mensaje += `⚡ *Bingo flash 25:* 3mil extra\n`;
                totalAcumulado += 3;
            }

            if (esRuletaMismoNumero) {
                mensaje += `🎰 *Ruleta # ${numRuleta}* gana 10mil extra\n`;
                totalAcumulado += 10;
                mensaje += ` \nTotal:\n👤 *${nombreBingo}* gana ${totalAcumulado}mil`;
            } else if (esAproximado) {
                // AQUÍ CORREGIDO: Se muestra el aproximado limpio, y solo lleva "Total" si hubo Flash antes
                mensaje += ` \n🎯 *Aproximado # ${numRuleta}*\n👤 *${nombreRuleta}* gana 5mil extra`;
                if (aplicarFlash) {
                    mensaje += `\n \nTotal:\n👤 *${nombreBingo}* gana ${totalAcumulado}mil`;
                }
            } else {
                // Solo muestra total si de verdad tiene acumulados extras (Flash)
                if (aplicarFlash) {
                    mensaje += ` \nTotal:\n👤 *${nombreBingo}* gana ${totalAcumulado}mil`;
                }
            }
        }

        navigator.clipboard.writeText(mensaje.trim());
        alert(`¡Mensaje de WhatsApp copiado! 🏆`);
    };

    window.cargarPremiosACaja = async () => {
        const bInput = document.getElementById("numGanador").value;
        const rInput = document.getElementById("numRuletaFisica").value;

        if (!bInput || !rInput) { alert("Ingresa los números de Bingo y Ruleta para calcular saldos."); return; }

        const numBingo = parseInt(bInput);
        const numRuleta = parseInt(rInput);
        const idxBingo = numBingo - 1;
        const cartonBingo = datos[idxBingo];

        if (!cartonBingo || !cartonBingo.lineas[0].nombre) { alert("El cartón no tiene un ganador."); return; }
        const nombreBingo = cartonBingo.lineas[0].nombre.toUpperCase();

        let vecinoAnterior = numBingo === 1 ? 15 : numBingo - 1;
        let vecinoPosterior = numBingo === 15 ? 1 : numBingo + 1;
        let esAproximado = (numRuleta === vecinoAnterior || numRuleta === vecinoPosterior);

        const idxRuleta = numRuleta - 1;
        const cartonRuleta = datos[idxRuleta];
        const nombreRuleta = (cartonRuleta && cartonRuleta.lineas[0].nombre) ? cartonRuleta.lineas[0].nombre.toUpperCase() : "";

        let premioBingoPrincipal = 10; 
        let premioVecino = 0;
        let premioLejosRuleta = 0;
        let nombrePremioLejos = nombreRuleta;

        if (numeroRonda === 5) {
            if (numBingo === numRuleta) {
                premioBingoPrincipal = 25; 
            } else if (esAproximado) {
                premioBingoPrincipal = 10;
                premioVecino = 10;
            } else {
                premioBingoPrincipal = 10;
                premioLejosRuleta = 5;
            }
        } else {
            let esRuletaMismoNumero = (numBingo === numRuleta);
            if (esRuletaMismoNumero) {
                premioBingoPrincipal = 20; 
            } else {
                if (document.getElementById("chkFlash").checked) {
                    premioBingoPrincipal = 13; 
                }
                if (esAproximado) {
                    premioVecino = 5;
                }
            }
        }

        let nuevaCaja = document.getElementById("notas-caja").value.toUpperCase();
        let lineas = nuevaCaja.split('\n').map(l => l.trim()).filter(l => l !== "");

        function agregarSaldo(nombre, cantidad) {
            if (!nombre || nombre === "SIN ASIGNAR" || cantidad === 0) return;
            let encontrado = false;
            lineas = lineas.map(l => {
                if (l.startsWith(nombre + ":")) {
                    encontrado = true;
                    let partes = l.split(':');
                    let nuevoValor = parseInt(partes[1].trim()) + cantidad;
                    return `${nombre}: ${nuevoValor}`;
                }
                return l;
            });
            if (!encontrado) {
                lineas.push(`${nombre}: ${cantidad}`);
            }
        }

        agregarSaldo(nombreBingo, premioBingoPrincipal);
        if (premioVecino > 0 && nombreRuleta) agregarSaldo(nombreRuleta, premioVecino);
        if (premioLejosRuleta > 0 && nombrePremioLejos) agregarSaldo(nombrePremioLejos, premioLejosRuleta);

        let cajaFinalTexto = lineas.join('\n');
        document.getElementById("notas-caja").value = cajaFinalTexto;

        await updateDoc(docRef, { notas_caja: cajaFinalTexto });
        alert(`💰 Premios cargados con éxito en la caja:\n- ${nombreBingo}: +${premioBingoPrincipal}mil` + 
              (premioVecino > 0 ? `\n- Vecino (${nombreRuleta}): +${premioVecino}mil` : '') + 
              (premioLejosRuleta > 0 ? `\n- Ruleta (${nombrePremioLejos}): +${premioLejosRuleta}mil` : ''));

        document.getElementById("numGanador").value = "";
        document.getElementById("numRuletaFisica").value = "";
        document.getElementById("chkFlash").checked = false;
    };

    window.reiniciarTablero = async () => {
        if (confirm("¿Limpiar tablero?")) {
            datos.forEach(c => { c.lineas[0].nombre = ""; c.lineas[0].estado = "libre"; });
            let proximaRonda = numeroRonda < 5 ? numeroRonda + 1 : 1;
            
            await updateDoc(docRef, { 
                cartones: datos,
                numero_ronda: proximaRonda
            });
            
            seleccionados = [];
            actualizarStats();
        }
    };

    function actualizarStats() {
        let lib = 0, res = 0, pag = 0;
        datos.forEach(c => {
            const e = c.lineas[0].estado;
            if(e === 'libre') lib++; else if(e === 'reservado') res++; else pag++;
        });
        
        const btnVerde = document.getElementById("btnCopiarPrincipal");
        const lblFlash = document.getElementById("lblFlash");
        
        if (numeroRonda === 5) {
            btnVerde.innerText = "📋 COPIAR LISTA ESPECIAL";
            btnVerde.style.background = "#ffcc00"; 
            lblFlash.style.display = "none"; 
        } else {
            btnVerde.innerText = "📋 COPIAR LISTA WHATSAPP";
            btnVerde.style.background = "#25D366"; 
            lblFlash.style.display = "flex"; 
        }
        
        document.getElementById("stats").innerHTML = `RONDA: ${numeroRonda} | LIBRES: ${lib} | RESERVADOS: ${res} | PAGADOS: ${pag} <br> <span style="color: #007bff;">${infoBusqueda}</span>`;
    }
</script>
</body>
</html>
