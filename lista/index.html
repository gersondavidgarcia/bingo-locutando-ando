<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Lineal - Locutando Ando</title>
    <link rel="icon" type="image/png" href="logo-locutando.png">

    <style>
        :root { --oro: #ffcc00; --fondo: #000; --verde-claro: #00ff88; }
        body { font-family: 'Arial Black', sans-serif; background: var(--fondo); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; }
        
        .header { background: #111; padding: 10px 15px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--oro); }
        
        input#nombreUser { 
            padding: 12px; border-radius: 8px; border: 2px solid #444; width: 90%; max-width: 500px;
            font-size: 18px; font-weight: bold; text-transform: uppercase; text-align: center; margin-bottom: 10px;
        }
        .stats-bar { color: var(--oro); font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        #msgLineas { color: #2196f3; display: block; margin-top: 5px; font-size: 12px; }

        .brand-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .brand-logo-img { height: 60px; width: auto; }
        .brand-text { color: #fff; font-size: 16px; font-weight: 900; }

        #adminPanel { 
            background: #1a1a1a; padding: 10px; display: none; 
            justify-content: center; gap: 8px; flex-wrap: wrap; border-bottom: 2px solid #333;
        }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        /* Estilo de Cartones Lineales */
        .tablero { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 15px; }
        .carton { background: #fff; border-radius: 6px; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .carton-h { background: #222; color: var(--oro); padding: 5px; font-weight: bold; text-align: center; font-size: 18px; }

        .linea { 
            height: 50px; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: 900; color: #000; cursor: pointer;
            text-align: center; padding: 4px; box-sizing: border-box;
        }

        .libre { color: #ccc !important; font-size: 20px !important; opacity: 0.4; }
        .reservado { background-color: #ffeb3b !important; }
        .pagado { background-color: #28a745 !important; color: #fff !important; }
        .sel { box-shadow: inset 0 0 0 4px #007bff !important; position: relative; }

        @media (max-width: 400px) { .tablero { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="nombreUser" placeholder="ESCRIBE TU NOMBRE">
        <div class="stats-bar">
            <span id="stats">CARGANDO...</span>
            <span id="msgLineas"></span>
        </div>
        <div class="brand-container">
            <button id="btnLupa" class="btn" style="background:#007bff; color:white; font-size: 18px;" onclick="toggleModoBusqueda()">🔍</button>
            <span class="brand-text">BINGO LINEAL</span>
            <img src="logo-locutando.png" class="brand-logo-img">
            <button class="btn" style="background:var(--oro);" onclick="toggleAdmin()">⚙️</button>
        </div>
    </div>

    <div id="adminPanel">
        <button class="btn" style="background:#28a745; color:white" onclick="marcarAccion('pagado')">💰 PAGAR</button>
        <button class="btn" style="background:#dc3545; color:white" onclick="marcarAccion('libre')">❌ LIBERAR</button>
        <button class="btn" style="background:#6f42c1; color:white" onclick="reiniciarTodo()">⚠️ REINICIAR</button>
    </div>

    <div class="tablero" id="tablero"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB12qk_Iw_xAFWnSw8RU_211o9HnyTczAQ",
            authDomain: "bingo-locutando-ando.firebaseapp.com",
            projectId: "bingo-locutando-ando",
            storageBucket: "bingo-locutando-ando.firebasestorage.app",
            messagingSenderId: "547896039173",
            appId: "1:547896039173:web:e7f5389dde11af9078096c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "bingo", "lineal");

        let datos = [];
        let seleccionados = [];
        let esAdmin = false;
        let modoLupa = false;

        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                datos = (d.cartones || []).slice(0, 15);
                dibujar();
                actualizarStats();
            }
        });

        function dibujar() {
            const container = document.getElementById("tablero");
            container.innerHTML = "";
            datos.forEach((carton, idx) => {
                const info = carton.lineas[0];
                const div = document.createElement("div");
                div.className = "carton";
                
                const isSelected = seleccionados.includes(idx);
                const tieneNombre = info.nombre && info.nombre !== "";

                div.innerHTML = `
                    <div class="carton-h">${carton.id}</div>
                    <div class="linea ${info.estado} ${isSelected ? 'sel' : ''} ${!tieneNombre ? 'libre' : ''}" 
                         onclick="manejarClick(${idx})">
                        ${tieneNombre ? info.nombre : carton.id}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function manejarClick(idx) {
            const info = datos[idx].lineas[0];

            if (modoLupa && info.nombre) {
                const nombreBuscado = info.nombre;
                seleccionados = [];
                let numeros = [];
                datos.forEach((c, i) => {
                    if(c.lineas[0].nombre === nombreBuscado) {
                        seleccionados.push(i);
                        numeros.push(c.id);
                    }
                });
                document.getElementById("msgLineas").innerText = `${nombreBuscado}: ${seleccionados.length} líneas (${numeros.join(", ")})`;
                dibujar();
            } else if (esAdmin) {
                const sIdx = seleccionados.indexOf(idx);
                if (sIdx > -1) seleccionados.splice(sIdx, 1);
                else seleccionados.push(idx);
                dibujar();
            } else {
                const nombre = document.getElementById("nombreUser").value.trim().toUpperCase();
                if (!nombre) { alert("Escribe tu nombre primero"); return; }
                if (info.estado === "libre") {
                    datos[idx].lineas[0] = { nombre: nombre, estado: "reservado" };
                    await updateDoc(docRef, { cartones: datos });
                }
            }
        }

        window.toggleModoBusqueda = () => {
            modoLupa = !modoLupa;
            seleccionados = [];
            document.getElementById("msgLineas").innerText = "";
            document.getElementById("btnLupa").style.background = modoLupa ? "#00ff88" : "#007bff";
            dibujar();
        };

        window.toggleAdmin = async () => {
            if(!esAdmin) {
                const pass = prompt("Clave:");
                if(pass === "1234") { // Cambia la clave si lo deseas
                    esAdmin = true;
                    document.getElementById("adminPanel").style.display = "flex";
                }
            } else {
                esAdmin = false;
                document.getElementById("adminPanel").style.display = "none";
                seleccionados = [];
                dibujar();
            }
        };

        window.marcarAccion = async (estado) => {
            if (seleccionados.length === 0) return;
            seleccionados.forEach(idx => {
                datos[idx].lineas[0].estado = estado;
                if (estado === 'libre') datos[idx].lineas[0].nombre = "";
            });
            await updateDoc(docRef, { cartones: datos });
            seleccionados = [];
            dibujar();
        };

        window.reiniciarTodo = async () => {
            if(confirm("¿Limpiar todos los nombres?")) {
                datos.forEach(c => { c.lineas[0].nombre = ""; c.lineas[0].estado = "libre"; });
                await updateDoc(docRef, { cartones: datos });
            }
        };

        function actualizarStats() {
            let lib = 0, res = 0, pag = 0;
            datos.forEach(c => {
                const e = c.lineas[0].estado;
                if(e === 'libre') lib++; else if(e === 'reservado') res++; else pag++;
            });
            document.getElementById("stats").innerText = `LIBRES: ${lib} | RESERVADOS: ${res} | PAGADOS: ${pag}`;
        }
    </script>
</body>
</html>
