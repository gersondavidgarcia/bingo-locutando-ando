<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Lineal - Control Pro</title>
    <link rel="icon" type="image/png" href="logo-locutando.png">
    <style>
        :root { --oro: #ffcc00; --fondo: #000; --verde: #00ff88; }
        body { font-family: 'Arial Black', sans-serif; background: var(--fondo); color: #fff; margin: 0; padding: 0; }
        
        /* Encabezado */
        .header { background: #111; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--oro); }
        .input-wrapper { position: relative; width: 90%; max-width: 500px; margin: auto; }
        input#nombreUser { 
            padding: 15px; border-radius: 8px; border: 2px solid #444; width: 100%;
            font-size: 20px; font-weight: bold; text-transform: uppercase; text-align: center; background: #222; color: var(--verde);
            box-sizing: border-box; padding-right: 45px;
        }
        .btn-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #444; color: #fff; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; font-size: 18px; line-height: 1; }

        /* Tablero */
        .tablero { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; max-width: 600px; margin: auto; }
        .carton { background: #fff; border-radius: 8px; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; height: 90px; transition: 0.2s; }
        .carton-h { background: #222; color: var(--oro); padding: 4px; font-weight: bold; text-align: center; font-size: 18px; }
        .linea { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #000; cursor: pointer; text-align: center; padding: 5px; box-sizing: border-box; text-transform: uppercase; }
        
        .libre { color: #ccc !important; font-size: 24px !important; opacity: 0.4; }
        .reservado { background-color: #ffeb3b !important; }
        .pagado { background-color: #28a745 !important; color: #fff !important; }
        .sel { outline: 5px solid #007bff; z-index: 5; transform: scale(1.02); }

        /* Panel inferior */
        .panel-inferior { background: #111; padding: 20px; border-top: 4px solid var(--oro); margin-top: 20px; }
        .controles-admin { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-verde { background: var(--verde); color: #000; }
        .btn-rojo { background: #dc3545; color: #fff; }
        .btn-azul { background: #007bff; color: #fff; }
        
        .btn-copiar-grande { background: #25D366; color: #000; width: 100%; font-size: 22px; padding: 20px; margin-top: 10px; border: 3px solid #fff; border-radius: 12px; }
        .btn-copiar-caja { background: #ffcc00; color: #000; width: 100%; font-size: 16px; padding: 15px; margin-top: 10px; border: 2px solid #000; border-radius: 8px; }

        textarea { width: 100%; background: #000; color: var(--oro); border: 2px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 16px; box-sizing: border-box; text-transform: uppercase; }
        .stats { text-align: center; color: var(--oro); margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="input-wrapper">
            <input type="text" id="nombreUser" list="sugerenciasCaja" placeholder="ESCRIBE NOMBRE AQUÍ" oninput="filtrarSugerencias(this.value)">
            <datalist id="sugerenciasCaja"></datalist>
            <button class="btn-clear" onclick="limpiarNombre()">✕</button>
        </div>
    </div>

    <div class="tablero" id="tablero"></div>

    <div class="panel-inferior">
        <div class="stats" id="stats">CARGANDO...</div>
        
        <div class="controles-admin">
            <button class="btn btn-verde" onclick="accionAdmin('pagado')">💰 MARCAR PAGO</button>
            <button class="btn btn-rojo" onclick="accionAdmin('libre')">❌ LIBERAR</button>
            <button class="btn btn-azul" onclick="toggleLupa()" id="btnLupa">🔍 BUSCAR</button>
        </div>

        <div class="caja-gastos">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="color: var(--verde); font-weight: bold;">📓 SALDOS DE CAJA</label>
                <button class="btn btn-verde" style="padding: 5px 10px;" onclick="guardarCaja()">💾 GUARDAR CAJA</button>
            </div>
            <textarea id="notas-caja" rows="5" placeholder="DAVID: 10" oninput="this.value = this.value.toUpperCase()"></textarea>
        </div>

        <button class="btn btn-copiar-grande" onclick="copiarListaBingo()">📋 COPIAR LISTA WHATSAPP</button>
        <button class="btn btn-copiar-caja" onclick="copiarSoloCaja()">📓 COPIAR SOLO SALDOS</button>
        
        <button class="btn btn-rojo" style="width:100%; margin-top:25px;" onclick="reiniciarTablero()">♻️ REINICIAR SOLO TABLERO</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB12qk_Iw_xAFWnSw8RU_211o9HnyTczAQ",
        authDomain: "bingo-locutando-ando.firebaseapp.com",
        projectId: "bingo-locutando-ando",
        storageBucket: "bingo-locutando-ando.firebasestorage.app",
        messagingSenderId: "547896039173",
        appId: "1:547896039173:web:e7f5389dde11af9078096c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "bingo", "lineal");

    let datos = [];
    let seleccionados = [];
    let modoLupa = false;
    let cajaTexto = "";
    let infoBusqueda = "";

    onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
            const d = snap.data();
            datos = (d.cartones || []).slice(0, 15);
            cajaTexto = d.notas_caja || "";
            document.getElementById('notas-caja').value = cajaTexto.toUpperCase();
            dibujar();
            actualizarStats();
        }
    });

    function dibujar() {
        const container = document.getElementById("tablero");
        container.innerHTML = "";
        datos.forEach((carton, idx) => {
            const info = carton.lineas[0];
            const isSelected = seleccionados.includes(idx);
            const tieneNombre = info.nombre && info.nombre !== "";
            const div = document.createElement("div");
            div.className = `carton ${isSelected ? 'sel' : ''}`;
            div.onclick = () => clickCasilla(idx);
            div.innerHTML = `
                <div class="carton-h">${carton.id}</div>
                <div class="linea ${info.estado} ${!tieneNombre ? 'libre' : ''}">
                    ${tieneNombre ? info.nombre : carton.id}
                </div>`;
            container.appendChild(div);
        });
    }

    window.filtrarSugerencias = (valor) => {
        const input = valor.toUpperCase();
        document.getElementById("nombreUser").value = input;
        const datalist = document.getElementById("sugerenciasCaja");
        datalist.innerHTML = "";
        if (input.length === 0) return;
        const lineasCaja = document.getElementById("notas-caja").value.split('\n');
        lineasCaja.forEach(linea => {
            const nombreCaja = linea.split(':')[0].trim();
            if (nombreCaja && nombreCaja.startsWith(input)) {
                const opt = document.createElement("option");
                opt.value = nombreCaja;
                datalist.appendChild(opt);
            }
        });
    };

    window.limpiarNombre = () => {
        document.getElementById("nombreUser").value = "";
        document.getElementById("sugerenciasCaja").innerHTML = "";
        document.getElementById("nombreUser").focus();
    };

    window.clickCasilla = async (idx) => {
        const info = datos[idx].lineas[0];
        const nombreInput = document.getElementById("nombreUser").value.trim().toUpperCase();
        
        if (modoLupa && info.nombre) {
            const buscar = info.nombre;
            seleccionados = [];
            datos.forEach((c, i) => { 
                if(c.lineas[0].nombre === buscar) seleccionados.push(i); 
            });
            infoBusqueda = `${buscar}: ${seleccionados.length} líneas en: ${seleccionados.map(i => i + 1).join(', ')}`;
            dibujar();
            actualizarStats();
        } else {
            if (info.estado !== 'libre' && nombreInput !== "") {
                toggleSel(idx);
                return;
            }
            if (info.estado === 'libre' && nombreInput !== "") {
                datos[idx].lineas[0] = { nombre: nombreInput, estado: "reservado" };
                await updateDoc(docRef, { cartones: datos });
            } else {
                toggleSel(idx);
            }
        }
    };

    function toggleSel(idx) {
        const sIdx = seleccionados.indexOf(idx);
        if (sIdx > -1) seleccionados.splice(sIdx, 1);
        else seleccionados.push(idx);
        dibujar();
    }

    window.accionAdmin = async (nuevoEstado) => {
        if (seleccionados.length === 0) return;
        let nuevaCaja = document.getElementById("notas-caja").value.toUpperCase();
        seleccionados.forEach(idx => {
            const nombre = datos[idx].lineas[0].nombre;
            const estadoAnterior = datos[idx].lineas[0].estado;
            if (nuevoEstado === 'pagado' && estadoAnterior !== 'pagado' && nombre) {
                let lineas = nuevaCaja.split('\n');
                let lineasProcesadas = [];
                lineas.forEach(l => {
                    if (l.toUpperCase().startsWith(nombre.toUpperCase() + ":")) {
                        let partes = l.split(':');
                        let valor = parseInt(partes[1]) - 1;
                        if (valor > 0) lineasProcesadas.push(`${partes[0].trim()}: ${valor}`);
                    } else if (l.trim() !== "") {
                        lineasProcesadas.push(l.trim());
                    }
                });
                nuevaCaja = lineasProcesadas.join('\n');
            }
            datos[idx].lineas[0].estado = nuevoEstado;
            if (nuevoEstado === 'libre') datos[idx].lineas[0].nombre = "";
        });
        await updateDoc(docRef, { cartones: datos, notas_caja: nuevaCaja });
        seleccionados = [];
    };

    window.guardarCaja = async () => {
        const txt = document.getElementById("notas-caja").value.toUpperCase();
        await updateDoc(docRef, { notas_caja: txt });
        alert("Caja guardada ✅");
    };

    window.toggleLupa = () => {
        modoLupa = !modoLupa;
        seleccionados = [];
        infoBusqueda = "";
        document.getElementById("btnLupa").style.background = modoLupa ? "#00ff88" : "#007bff";
        document.getElementById("btnLupa").innerText = modoLupa ? "✅ BUSCANDO" : "🔍 BUSCAR";
        dibujar();
        actualizarStats();
    };

    window.copiarListaBingo = () => {
        let txt = "*🎰 LISTADO BINGO LINEAL*\n\n";
        txt += "*Precio:* $1.000\n";
        txt += "*Premio:* $10.000\n\n";
        datos.forEach(c => {
            const i = c.lineas[0];
            txt += `${c.id} 🍀 ${i.nombre ? i.nombre : ""}${i.estado === "pagado" ? " ✅" : ""}\n`;
        });
        txt += "\n✅ *Nequi: 3169461962*";
        navigator.clipboard.writeText(txt);
        alert("Lista copiada");
    };

    window.copiarSoloCaja = () => {
        const caja = document.getElementById("notas-caja").value;
        if(!caja.trim()) { alert("La caja está vacía"); return; }
        let txt = "*📓 SALDOS DE CAJA*\n\n" + caja;
        navigator.clipboard.writeText(txt);
        alert("Saldos copiados");
    };

    window.reiniciarTablero = async () => {
        if (confirm("¿Limpiar solo el tablero?")) {
            datos.forEach(c => { c.lineas[0].nombre = ""; c.lineas[0].estado = "libre"; });
            await updateDoc(docRef, { cartones: datos });
            seleccionados = [];
        }
    };

    function actualizarStats() {
        let lib = 0, res = 0, pag = 0;
        datos.forEach(c => {
            const e = c.lineas[0].estado;
            if(e === 'libre') lib++; else if(e === 'reservado') res++; else pag++;
        });
        const statsBase = `LIBRES: ${lib} | RESERVADOS: ${res} | PAGADOS: ${pag}`;
        document.getElementById("stats").innerHTML = `${statsBase} <span style="color: #00ff88; margin-left: 15px; font-style: italic;">${infoBusqueda}</span>`;
    }
</script>
</body>
</html>
