<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Locutando Ando</title>

    <meta property="og:url" content="https://gersondavidgarcia.github.io/bingo-locutando-ando/">
    <meta property="og:title" content="🎰 BINGO LOCUTANDO ANDO">
    <meta property="og:image" content="https://raw.githubusercontent.com/gersondavidgarcia/bingo-locutando-ando/main/logo-locutando.png">
    <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/gersondavidgarcia/bingo-locutando-ando/main/logo-locutando.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">

    <link rel="icon" type="image/png" href="logo-locutando.png">

    <style>
        :root { --oro: #ffcc00; --fondo: #000; --columnas: 6; --verde-claro: #00ff88; }
        body { font-family: 'Arial Black', sans-serif; background: var(--fondo); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { background: #111; padding: 5px 15px 0px 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        
        input#nombreUser { 
            padding: 10px; border-radius: 8px; border: 2px solid #444; width: 90%; max-width: 600px;
            font-size: 18px; font-weight: bold; text-transform: uppercase; text-align: center;
        }
        .stats-bar { color: var(--oro); font-size: 14px; margin: 5px 0; font-weight: bold; }
        #msgLineas { color: #2196f3; font-style: italic; margin-left: 5px; font-weight: bold; }

        .brand-container { display: flex; align-items: center; justify-content: center; gap: 20px; padding-bottom: 5px; margin: 0; }
        .brand-logo-img { height: 90px; width: auto; display: block; }
        .brand-text { color: #ffffff; font-size: 20px; text-transform: uppercase; font-weight: 900; }

        .separador-oro { border-bottom: 4px solid var(--oro); width: 100%; margin: 0; }

        #adminPanel { 
            background: #1a1a1a; padding: 10px; display: none; 
            justify-content: center; gap: 6px; flex-wrap: wrap; border-bottom: 2px solid #333;
        }
        .btn { padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .col-control { display: flex; align-items: center; gap: 8px; background: #333; padding: 5px 12px; border-radius: 5px; color: var(--oro); font-size: 10px; }

        /* ESTILOS CAPTURA */
        .btn-volver-container { 
            width: 100%; display: none; justify-content: center; padding: 25px 0; 
            background: var(--fondo); position: fixed; bottom: 0; left: 0; z-index: 9999;
        }
        .btn-volver { background-color: var(--oro); color: #000; padding: 10px 40px; border-radius: 40px; font-size: 15px; font-weight: 900; border: none; cursor: pointer; }

        .modo-captura .header, .modo-captura #adminPanel { display: none !important; }
        .modo-captura .btn-volver-container { display: flex !important; }
        
        .modo-captura .tablero { 
            transform: scale(0.5); transform-origin: top center; width: 200%; 
            margin-left: -50%; padding-top: 20px; padding-bottom: 150px; gap: 5px; 
        }

        .tablero { display: grid; grid-template-columns: repeat(var(--columnas), 1fr); gap: 13px; padding: 15px; width: 100%; box-sizing: border-box; transition: all 0.3s ease; }
        .carton { background: #fff; border-radius: 4px; border: 2px solid #000; overflow: hidden; display: flex; flex-direction: column; }
        .carton-h { 
            background: #222; color: #ffcc00; font-size: 22px; padding: 8px; font-weight: bold; text-align: center; 
            border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #fff; border-bottom: none; 
        }

        /* --- AJUSTES DE LÍNEA Y TEXTO --- */
        .linea { 
            height: 52px; 
            display: flex; 
            align-items: center; 
            justify-content: center; /* Por defecto centrado */
            font-size: 16px; 
            font-weight: 900; 
            border-bottom: 2px solid #000; 
            color: #000; 
            cursor: pointer;
            padding: 0 6px;
            box-sizing: border-box;
            
            /* Fuerza a que el texto sea una sola línea */
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* Esta clase se aplica vía JS si el nombre es largo */
        .nombre-largo {
            justify-content: flex-start !important; 
            text-align: left !important;
        }

        .libre { color: #ccc !important; font-weight: normal; font-size: 14px; }
        .reservado { background-color: #ffeb3b !important; color: #000 !important; }
        .pagado { background-color: #28a745 !important; color: #fff !important; }
        .sel { box-shadow: inset 0 0 0 5px #007bff !important; position: relative; z-index: 10; }

        @media (max-width: 700px) { :root { --columnas: 2; } }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="nombreUser" placeholder="ESCRIBE TU NOMBRE AQUÍ">
        <div class="stats-bar">
            <span id="stats">LIBRES: 0 | RESERVADOS: 0 | PAGADOS: 0</span>
            <span id="msgLineas"></span>
        </div>
        <div class="brand-container">
            <span class="brand-text">🎰 BINGO LOCUTANDO</span>
            <img src="logo-locutando.png" class="brand-logo-img" alt="Logo">
            <button class="btn" style="background:var(--oro); color:#000" onclick="toggleAdmin()">⚙️ ADMIN</button>
        </div>
        <div class="separador-oro"></div>
    </div>

    <div id="adminPanel">
        <button class="btn" style="background:#444; color:white" onclick="gestionarFilas(1)">+ FILA</button>
        <button class="btn" style="background:#444; color:white" onclick="gestionarFilas(-1)">- FILA</button>
        <div class="col-control">
            COL <input type="range" min="3" max="9" value="6" id="rangeCol" oninput="cambiarCols(this.value)"> <span id="valCol">6</span>
        </div>
        
        <button id="btnDual" class="btn" style="background:#007bff; color:white" onclick="manejarBotonDual()">🔍 VERIFICAR</button>
        <button id="btnBloqueo" class="btn" onclick="toggleBloqueo()">🔓 ABIERTO</button>
        <button class="btn" style="background:#6f42c1; color:white" onclick="deshacerAccion()">↩️ DESHACER</button>
        <button class="btn" style="background:#ff4444; color:white" onclick="reiniciarBingo()">⚠️ REINICIAR</button>
        <button class="btn" style="background:#28a745; color:white" onclick="marcarAccion('pagado')">💰 PAGAR</button>
        <button class="btn" style="background:#dc3545; color:white" onclick="marcarAccion('libre')">❌ LIBERAR</button>
        <button class="btn" style="background:var(--oro); color:#000" onclick="activarCaptura()">📸 CAPTURA</button>
    </div>

    <div class="tablero" id="tablero"></div>

    <div class="btn-volver-container" id="volverArea">
        <button class="btn btn-volver" onclick="desactivarCaptura()">🔙 VOLVER</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB12qk_Iw_xAFWnSw8RU_211o9HnyTczAQ",
            authDomain: "bingo-locutando-ando.firebaseapp.com",
            projectId: "bingo-locutando-ando",
            storageBucket: "bingo-locutando-ando.firebasestorage.app",
            messagingSenderId: "547896039173",
            appId: "1:547896039173:web:e7f5389dde11af9078096c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "bingo", "tablero");

        let datos = [];
        let historial = [];
        let seleccionados = [];
        let config = { admin: false, bloqueado: false };
        let modoVerificacion = false; 

        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                datos = d.cartones || [];
                config.bloqueado = d.bloqueado || false;
                document.getElementById("nombreUser").disabled = config.bloqueado;
                const btnB = document.getElementById("btnBloqueo");
                btnB.innerText = config.bloqueado ? "🔒 CERRADO" : "🔓 ABIERTO";
                btnB.style.background = config.bloqueado ? "#dc3545" : "#00ff88";
                dibujar();
                actualizarStats();
            }
        });

        function dibujar() {
            const container = document.getElementById("tablero");
            container.innerHTML = "";
            datos.forEach((carton, cIdx) => {
                const div = document.createElement("div");
                div.className = "carton";
                div.innerHTML = `<div class="carton-h">${cIdx + 1}</div>`;
                carton.lineas.forEach((linea, lIdx) => {
                    const lDiv = document.createElement("div");
                    const texto = linea.nombre || "LIBRE";
                    lDiv.className = `linea ${linea.estado}`;
                    
                    // Lógica para alinear a la izquierda si el nombre es largo
                    if(texto !== "LIBRE" && texto.length >= 14) {
                        lDiv.classList.add("nombre-largo");
                    }

                    if(texto === "LIBRE") lDiv.classList.add("libre");
                    if(seleccionados.some(s => s.c === cIdx && s.l === lIdx)) lDiv.classList.add("sel");
                    
                    lDiv.innerText = texto;
                    lDiv.onclick = () => manejarClick(cIdx, lIdx);
                    div.appendChild(lDiv);
                });
                container.appendChild(div);
            });
            
            const btn = document.getElementById("btnDual");
            if (modoVerificacion) {
                btn.innerText = "✅ LISTO";
                btn.style.background = "#28a745";
            } else {
                btn.innerText = "🔍 VERIFICAR";
                btn.style.background = "#007bff";
            }
        }

        async function manejarClick(c, l) {
            if(config.admin) {
                const nombreClick = datos[c].lineas[l].nombre;

                if (modoVerificacion && nombreClick && nombreClick !== "") {
                    seleccionados = [];
                    let listaCartones = [];
                    datos.forEach((carton, ci) => {
                        carton.lineas.forEach((linea, li) => {
                            if(linea.nombre === nombreClick) {
                                seleccionados.push({c: ci, l: li});
                                if(!listaCartones.includes(ci + 1)) listaCartones.push(ci + 1);
                            }
                        });
                    });
                    document.getElementById("msgLineas").innerText = `| ${nombreClick}: ${seleccionados.length} líneas en: ${listaCartones.join(", ")}`;
                } 
                else {
                    const idx = seleccionados.findIndex(s => s.c === c && s.l === l);
                    if (idx > -1) seleccionados.splice(idx, 1);
                    else seleccionados.push({c, l});
                    if (!modoVerificacion) document.getElementById("msgLineas").innerText = "";
                }
                dibujar();
            } else {
                if(config.bloqueado) return;
                const n = document.getElementById("nombreUser").value.trim().toUpperCase();
                if(!n) return;
                if(datos[c].lineas[l].estado === "libre") {
                    guardarHistorial();
                    datos[c].lineas[l] = { nombre: n, estado: "reservado" };
                    await updateDoc(docRef, { cartones: datos });
                }
            }
        }

        window.manejarBotonDual = () => {
            if (!modoVerificacion) {
                modoVerificacion = true;
            } else {
                modoVerificacion = false;
                seleccionados = [];
                document.getElementById("msgLineas").innerText = "";
            }
            dibujar();
        };

        window.activarCaptura = () => { document.body.classList.add('modo-captura'); document.getElementById('volverArea').style.display = 'flex'; };
        window.desactivarCaptura = () => { document.body.classList.remove('modo-captura'); document.getElementById('volverArea').style.display = 'none'; };

        window.toggleAdmin = async () => {
            if(!config.admin) {
                const pass = prompt("Clave:");
                const snap = await getDoc(docRef);
                if(pass === snap.data().pass) {
                    config.admin = true;
                    document.getElementById("adminPanel").style.display = "flex";
                }
            } else {
                config.admin = false;
                document.getElementById("adminPanel").style.display = "none";
                modoVerificacion = false;
                seleccionados = [];
                document.getElementById("msgLineas").innerText = "";
                dibujar();
            }
        };

        async function guardarHistorial() {
            historial.push(JSON.parse(JSON.stringify(datos)));
            if(historial.length > 10) historial.shift();
        }

        window.marcarAccion = async (est) => {
            if(!seleccionados.length) return;
            guardarHistorial();
            seleccionados.forEach(s => {
                datos[s.c].lineas[s.l].estado = est;
                if(est === 'libre') datos[s.c].lineas[s.l].nombre = "";
            });
            seleccionados = [];
            document.getElementById("msgLineas").innerText = "";
            await updateDoc(docRef, { cartones: datos });
        };

        window.deshacerAccion = async () => {
            if(historial.length > 0) {
                datos = historial.pop();
                await updateDoc(docRef, { cartones: datos });
                seleccionados = [];
                document.getElementById("msgLineas").innerText = "";
                dibujar();
            }
        };

        window.reiniciarBingo = async () => { 
            if(confirm("¿BORRAR TODO?")) { 
                guardarHistorial(); 
                datos.forEach(c => c.lineas.forEach(l => { l.nombre = ""; l.estado = "libre"; })); 
                seleccionados = [];
                document.getElementById("msgLineas").innerText = "";
                await updateDoc(docRef, { cartones: datos }); 
            } 
        };

        window.toggleBloqueo = async () => await updateDoc(docRef, { bloqueado: !config.bloqueado });
        window.gestionarFilas = async (cambio) => {
            guardarHistorial();
            datos.forEach(c => {
                if (cambio === 1) c.lineas.push({nombre: "", estado: "libre"});
                else if (cambio === -1 && c.lineas.length > 1) c.lineas.pop();
            });
            await updateDoc(docRef, { cartones: datos });
        };
        window.cambiarCols = (v) => { document.documentElement.style.setProperty('--columnas', v); document.getElementById("valCol").innerText = v; };
        
        function actualizarStats() {
            let lib=0, res=0, pag=0;
            datos.forEach(c => c.lineas.forEach(l => { if(l.estado==='libre') lib++; else if(l.estado==='reservado') res++; else pag++; }));
            document.getElementById("stats").innerText = `LIBRES: ${lib} | RESERVADOS: ${res} | PAGADOS: ${pag}`;
        }
    </script>
</body>
</html>
