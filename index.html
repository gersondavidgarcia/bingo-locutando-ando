<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Bingo Locutando</title>
    <style>
        :root { --oro: #ffcc00; --fondo: #000; --columnas: 6; --verde-claro: #00ff88; }
        body { font-family: 'Arial Black', sans-serif; background: var(--fondo); color: #fff; margin: 0; padding: 0; }
        
        /* Header y Branding */
        .header { background: #111; padding: 15px; border-bottom: 3px solid var(--oro); text-align: center; position: sticky; top: 0; z-index: 1000; }
        .brand-container { display: flex; align-items: center; justify-content: center; gap: 25px; margin-top: 15px; }
        
        .brand-text { 
            color: #ffffff; 
            font-size: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        input#nombreUser { 
            padding: 12px; border-radius: 8px; border: 2px solid #444; width: 90%; max-width: 600px;
            font-size: 18px; font-weight: bold; text-transform: uppercase; text-align: center;
        }
        .stats-bar { color: var(--oro); font-size: 14px; margin: 8px 0; font-weight: bold; min-height: 20px; }

        /* Panel Admin */
        #adminPanel { 
            background: #1a1a1a; padding: 10px; display: none; 
            justify-content: center; gap: 6px; flex-wrap: wrap; border-bottom: 2px solid #333;
        }
        .btn { padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; display: flex; align-items: center; gap: 5px; }
        .btn-blue { background: #007bff; color: white; }
        
        /* Verdes Diferenciados */
        .btn-lock.abierto { background: var(--verde-claro); color: #000; } 
        .btn-lock.cerrado { background: #dc3545; color: white; } 
        .btn-pagar { background: #28a745; color: white; }
        
        .btn-reiniciar { background: #ff4444; color: white; }
        .btn-undo { background: #6f42c1; color: white; }
        .btn-grey { background: #444; color: white; border: 1px solid #666; }

        .col-control { display: flex; align-items: center; gap: 8px; background: #333; padding: 5px 12px; border-radius: 5px; color: var(--oro); font-size: 10px; }

        /* Tablero */
        .tablero { 
            display: grid; grid-template-columns: repeat(var(--columnas), 1fr); 
            gap: 15px; padding: 15px; width: 100%; box-sizing: border-box;
        }

        /* Cartones */
        .carton { 
            background: #fff; border-radius: 4px; border: 2px solid #000; 
            overflow: hidden; display: flex; flex-direction: column;
        }
        /* Texto de números de cartones en gris claro */
        .carton-h { background: #333; color: #e0e0e0; font-size: 18px; padding: 5px; font-weight: bold; text-align: center; border-bottom: 2px solid #000; }
        
        .linea { 
            height: 48px; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: 900; cursor: pointer; 
            border-bottom: 2px solid #000; 
            padding: 0 8px; width: 100%; box-sizing: border-box; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #000;
        }
        .linea:last-child { border-bottom: none; }

        .libre { color: #ccc !important; font-weight: normal; font-size: 12px; }
        .nombre-largo { justify-content: flex-start !important; padding-left: 10px !important; }

        /* Estados */
        .reservado { background-color: #ffeb3b !important; color: #000 !important; }
        .pagado { background-color: #28a745 !important; color: #fff !important; }
        .sel { box-shadow: inset 0 0 0 5px #007bff !important; position: relative; z-index: 10; }

        @media (max-width: 700px) { :root { --columnas: 2; } }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="nombreUser" placeholder="ESCRIBE TU NOMBRE AQUÍ">
        <div class="stats-bar">
            <span id="stats">LIBRES: 0 | RESERVADOS: 0 | PAGADOS: 0</span>
            <span id="msgLineas"></span>
        </div>
        <div class="brand-container">
            <span class="brand-text">🎰 BINGO LOCUTANDO</span>
            <button class="btn" style="background:var(--oro)" onclick="toggleAdmin()">⚙️ ADMIN</button>
        </div>
    </div>

    <div id="adminPanel">
        <button class="btn btn-grey" onclick="gestionarFilas(1)">+ FILA</button>
        <button class="btn btn-grey" onclick="gestionarFilas(-1)">- FILA</button>
        <div class="col-control">
            COL <input type="range" min="3" max="9" value="6" id="rangeCol" oninput="cambiarCols(this.value)"> <span id="valCol">6</span>
        </div>
        <button id="btnAutoSel" class="btn btn-blue" onclick="toggleAutoSel()">AUTOSELECCION: OFF</button>
        <button id="btnBloqueo" class="btn btn-lock" onclick="toggleBloqueo()">🔓 ABIERTO</button>
        
        <button class="btn btn-undo" onclick="deshacerAccion()">↩️ DESHACER</button>
        <button class="btn btn-reiniciar" onclick="reiniciarBingo()">⚠️ REINICIAR</button>
        <button class="btn" style="background:#6c757d; color:white" onclick="deseleccionarTodo()">🧹 LIMPIAR</button>
        <button class="btn btn-pagar" onclick="marcarAccion('pagado')">💰 PAGAR</button>
        <button class="btn" style="background:#dc3545; color:white" onclick="marcarAccion('libre')">🔄 LIBERAR</button>
        <button class="btn" style="background:var(--oro); color:#000" onclick="activarCaptura()">📸 CAPTURA</button>
    </div>

    <div class="tablero" id="tablero"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB12qk_Iw_xAFWnSw8RU_211o9HnyTczAQ",
            authDomain: "bingo-locutando-ando.firebaseapp.com",
            projectId: "bingo-locutando-ando",
            storageBucket: "bingo-locutando-ando.firebasestorage.app",
            messagingSenderId: "547896039173",
            appId: "1:547896039173:web:e7f5389dde11af9078096c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "bingo", "tablero");

        let datos = [];
        let historial = [];
        let seleccionados = [];
        let config = { admin: false, autoSel: false, bloqueado: false };

        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                datos = d.cartones || [];
                config.bloqueado = d.bloqueado || false;
                document.getElementById("nombreUser").disabled = config.bloqueado;
                const btnB = document.getElementById("btnBloqueo");
                btnB.innerText = config.bloqueado ? "🔒 CERRADO" : "🔓 ABIERTO";
                btnB.className = config.bloqueado ? "btn btn-lock cerrado" : "btn btn-lock abierto";
                dibujar();
                actualizarStats();
            }
        });

        function dibujar() {
            const container = document.getElementById("tablero");
            container.innerHTML = "";
            datos.forEach((carton, cIdx) => {
                const div = document.createElement("div");
                div.className = "carton";
                div.innerHTML = `<div class="carton-h">${cIdx + 1}</div>`;
                carton.lineas.forEach((linea, lIdx) => {
                    const lDiv = document.createElement("div");
                    const texto = linea.nombre || "LIBRE";
                    lDiv.className = `linea ${linea.estado}`;
                    if(texto === "LIBRE") lDiv.classList.add("libre");
                    if(texto.length > 13) lDiv.classList.add("nombre-largo");
                    if(seleccionados.some(s => s.c === cIdx && s.l === lIdx)) lDiv.classList.add("sel");
                    lDiv.innerText = texto;
                    lDiv.onclick = () => manejarClick(cIdx, lIdx);
                    div.appendChild(lDiv);
                });
                container.appendChild(div);
            });
        }

        async function guardarHistorial() {
            historial.push(JSON.parse(JSON.stringify(datos)));
            if(historial.length > 10) historial.shift();
        }

        window.deshacerAccion = async () => {
            if(historial.length > 0) {
                datos = historial.pop();
                await updateDoc(docRef, { cartones: datos });
                deseleccionarTodo();
            } else alert("Nada que deshacer.");
        };

        async function manejarClick(c, l) {
            if(config.admin) {
                const nombreClick = datos[c].lineas[l].nombre;
                if (config.autoSel && nombreClick && nombreClick !== "") {
                    seleccionados = [];
                    datos.forEach((carton, ci) => {
                        carton.lineas.forEach((linea, li) => {
                            if(linea.nombre === nombreClick) seleccionados.push({c: ci, l: li});
                        });
                    });
                } else {
                    const yaEstaSel = seleccionados.some(s => s.c === c && s.l === l);
                    if (yaEstaSel) seleccionados = seleccionados.filter(s => !(s.c === c && s.l === l));
                    else seleccionados.push({c, l});
                }
                dibujar();
            } else {
                if(config.bloqueado) return;
                const n = document.getElementById("nombreUser").value.trim().toUpperCase();
                if(!n) return alert("ESCRIBE TU NOMBRE.");
                if(datos[c].lineas[l].estado === "libre") {
                    guardarHistorial();
                    datos[c].lineas[l] = { nombre: n, estado: "reservado" };
                    await updateDoc(docRef, { cartones: datos });
                }
            }
        }

        window.toggleAdmin = () => {
            if(!config.admin) {
                if(prompt("Clave Admin:") === "1234") {
                    config.admin = true;
                    document.getElementById("adminPanel").style.display = "flex";
                }
            } else {
                config.admin = false;
                document.getElementById("adminPanel").style.display = "none";
                deseleccionarTodo();
            }
        };

        window.reiniciarBingo = async () => {
            if(confirm("¿REINICIAR TODO EL BINGO?")) {
                guardarHistorial();
                datos.forEach(carton => {
                    carton.lineas.forEach(linea => {
                        linea.nombre = "";
                        linea.estado = "libre";
                    });
                });
                deseleccionarTodo();
                await updateDoc(docRef, { cartones: datos });
            }
        };

        window.marcarAccion = async (est) => {
            if(seleccionados.length === 0) return;
            guardarHistorial();
            seleccionados.forEach(s => {
                datos[s.c].lineas[s.l].estado = est;
                if(est === 'libre') datos[s.c].lineas[s.l].nombre = "";
            });
            deseleccionarTodo();
            await updateDoc(docRef, { cartones: datos });
        };

        window.toggleAutoSel = () => {
            config.autoSel = !config.autoSel;
            document.getElementById("btnAutoSel").innerText = config.autoSel ? "AUTOSELECCION: ON" : "AUTOSELECCION: OFF";
            document.getElementById("btnAutoSel").style.background = config.autoSel ? "#28a745" : "#007bff";
        };

        window.toggleBloqueo = async () => {
            await updateDoc(docRef, { bloqueado: !config.bloqueado });
        };

        window.gestionarFilas = async (cambio) => {
            guardarHistorial();
            datos.forEach(carton => {
                if (cambio === 1) carton.lineas.push({nombre: "", estado: "libre"});
                else if (cambio === -1 && carton.lineas.length > 1) carton.lineas.pop();
            });
            await updateDoc(docRef, { cartones: datos });
        };

        window.cambiarCols = (v) => {
            document.documentElement.style.setProperty('--columnas', v);
            document.getElementById("valCol").innerText = v;
        };

        window.deseleccionarTodo = () => {
            seleccionados = [];
            dibujar();
        };

        function actualizarStats() {
            let lib = 0, res = 0, pag = 0;
            datos.forEach(c => c.lineas.forEach(l => {
                if(l.estado === 'libre') lib++;
                else if(l.estado === 'reservado') res++;
                else pag++;
            }));
            document.getElementById("stats").innerText = `LIBRES: ${lib} | RESERVADOS: ${res} | PAGADOS: ${pag}`;
        }
    </script>
</body>
</html>
